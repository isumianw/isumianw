name: Generate Pacman Graph

on:
  schedule:
    - cron: "0 0 * * *" # Runs every midnight
  workflow_dispatch: 

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: platane/snk@v3
        with:
          github_user_name: isumianw
          outputs: |
           dist/github-contribution-grid-snake.svg?color_snake=#73cfee&color_dots=#282a36,#f7f7f1,#ff6e96,#73cfee,#ff6e96
            dist/github-contribution-grid-snake-dark.svg?color_snake=#73cfee&color_dots=#282a36,#f7f7f1,#ff6e96,#73cfee,#ff6e96
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
