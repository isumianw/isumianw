name: Generate Pacman Graph

on:
  schedule:
    - cron: "0 0 * * *" # Runs every midnight
  workflow_dispatch: 

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions: 
      contents: write # Needed to push to the output branch
    steps:
      - uses: platane/snk@v3
        with:
          github_user_name: isumianw
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#eb00f4&color_dots=#282a36,#f6ced4,#ff6e96,#73cfee,#ff6e96
            dist/pacman-contribution-graph-dark.svg?color_snake=#eb00f4&color_dots=#282a36,#f6ced4,#ff6e96,#73cfee,#ff6e96
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
